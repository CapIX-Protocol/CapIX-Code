name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Capix Code ${{ github.ref_name }}
          body: |
            ## Capix Code ${{ github.ref_name }}

            The CLI coding assistant for the Capix network.

            ### Install

            ```bash
            npm i -g capix-code
            ```

            Then:
            ```bash
            export CAPIX_BASE_URL=https://capix.network/api/v1
            export CAPIX_API_KEY=cpk_...
            capix-code
            ```
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.artifact }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: capix-code-linux-x64
          - os: macos-13
            artifact: capix-code-macos-x64
          - os: macos-14
            artifact: capix-code-macos-arm64
          - os: windows-latest
            artifact: capix-code-windows-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout capix-code repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/
        continue-on-error: true

      - name: Test
        run: npx vitest run
        continue-on-error: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Clone upstream source
        run: bash scripts/bootstrap.sh
        env:
          CAPIX_CODE_DIR: ${{ github.workspace }}/opencode

      - name: Install deps
        run: bun install
        working-directory: opencode

      - name: Apply rebrand
        run: bash scripts/rebrand.sh
        env:
          CAPIX_CODE_DIR: ${{ github.workspace }}/opencode

      - name: Install Capix config + branding
        run: bash scripts/install-config.sh
        env:
          CAPIX_CODE_DIR: ${{ github.workspace }}/opencode

      - name: Build standalone binary
        run: bash scripts/build.sh
        env:
          CAPIX_CODE_DIR: ${{ github.workspace }}/opencode

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            opencode/packages/opencode/dist/**/capix-code*
            opencode/packages/opencode/dist/**/opencode*

  publish:
    name: Upload to release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
