name: Release binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Artifact version without v prefix'
        required: true
      release_tag:
        description: 'Existing release tag to update'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    strategy:
      # Let every native runner report its own result. The publish job still
      # requires the entire matrix, so a single failure prevents any release.
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
            npm-platform: darwin
          - os: macos-15-intel
            platform: darwin
            arch: x64
            npm-platform: darwin
          - os: ubuntu-latest
            platform: linux
            arch: x64
            npm-platform: linux
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            npm-platform: linux
          - os: windows-latest
            platform: win32
            arch: x64
            npm-platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux credential-store build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libdbus-1-dev pkg-config
      - name: Install overlay dependencies
        run: npm ci
      - name: Verify immutable release identity
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p 'require("./package.json").version')"
          test "${{ inputs.version }}" = "$package_version"
          test "${{ inputs.release_tag }}" = "v$package_version"
          node scripts/check-release-consistency.mjs "$package_version"
      - name: Verify overlay
        run: |
          npm run compile
          npm test
      - name: Bootstrap pinned engine
        shell: bash
        run: |
          bash scripts/bootstrap.sh
          bash scripts/rebrand.sh
          bash scripts/install-config.sh
      - name: Build complete customer runtime
        shell: bash
        run: bash scripts/build.sh
      - name: Packaged MCP protocol smoke test
        run: node scripts/smoke-mcp.mjs dist/customer
      - name: Native launcher smoke test
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = win32 ]; then
            dist/customer/bin/capix-code.exe doctor
          else
            dist/customer/bin/capix-code doctor
          fi
      - name: Package and statically verify
        shell: bash
        run: bash scripts/package-customer.sh "${{ inputs.version }}" "${{ matrix.platform }}" "${{ matrix.arch }}"
      - name: Package npm native runtime
        shell: bash
        run: |
          node scripts/prepare-npm-platform.mjs "${{ matrix.npm-platform }}" "${{ matrix.arch }}" dist/customer npm-platform
          cd "npm-platform/${{ matrix.npm-platform }}-${{ matrix.arch }}"
          npm pack --pack-destination "$GITHUB_WORKSPACE/release-artifacts"
      - uses: actions/upload-artifact@v4
        with:
          name: capix-code-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-artifacts/
          retention-days: 30

  package-npm-meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify immutable npm release identity
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p 'require("./package.json").version')"
          test "${{ inputs.version }}" = "$package_version"
          test "${{ inputs.release_tag }}" = "v$package_version"
          node scripts/check-release-consistency.mjs "$package_version"
      - name: Pack cross-platform npm launcher
        run: |
          mkdir -p release-artifacts
          npm pack --pack-destination release-artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: capix-code-npm-meta
          path: release-artifacts/
          retention-days: 30

  publish:
    needs: [build, package-npm-meta]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install release metadata dependencies
        # npm 11 rejects intentionally unpublished optional platform packages
        # before their release assets exist. Match the Node 22 build lanes and
        # pin npm 10 so SBOM generation remains reproducible.
        run: npx --yes npm@10.9.4 ci --ignore-scripts
      - name: Materialize immutable release manifest and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          find artifacts -type f -exec cp {} release-artifacts/ \;

          node scripts/build-manifest.mjs \
            --entries release-artifacts \
            --base-url https://github.com/CapIX-Protocol/CapIX-Code/releases/download \
            --stable-version "${{ inputs.release_tag }}" \
            --source-sha "${{ github.sha }}" \
            --launcher-version "${{ inputs.version }}" \
            --opencode-version 1.17.18 \
            --plugin-version "${{ inputs.version }}" \
            --provider-version "${{ inputs.version }}" \
            --out release-artifacts/release-manifest.json \
            --require-all
          node scripts/validate-manifest.mjs release-artifacts/release-manifest.json

          cp NOTICE release-artifacts/NOTICE
          npx --yes npm@10.9.4 sbom --sbom-format spdx > release-artifacts/sbom.spdx.json
          jq -n \
            --arg tag "${{ inputs.release_tag }}" \
            --arg sourceSha "${{ github.sha }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg runId "${{ github.run_id }}" \
            '{schemaVersion:1, product:"capix-code", tag:$tag, sourceSha:$sourceSha, builder:"github-actions", workflow:$workflow, runId:$runId, unsigned:true}' \
            > release-artifacts/provenance.json

          find release-artifacts -maxdepth 1 -type f ! -name '*.sha256' -print0 | while IFS= read -r -d '' file; do
            digest="$(sha256sum "$file" | awk '{print $1}')"
            printf '%s  %s\n' "$digest" "$(basename "$file")" > "$file.sha256"
          done
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Capix Code ${{ inputs.release_tag }} (UNSIGNED)
          draft: false
          files: release-artifacts/*
          body: |
            Capix Code customer binaries for macOS arm64/x64, Linux arm64/x64 and Windows x64,
            plus npm platform packages and the cross-platform `capix-code` launcher package.

            These artifacts are unsigned. Verify the adjacent SHA-256 file before use.
            Each platform was built and smoke-tested on its native GitHub-hosted runner.
            Source commit: `${{ github.sha }}`

  publish-npm:
    name: Publish npm installer
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify release exists before registry publication
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "${{ inputs.release_tag }}" --repo "${{ github.repository }}"
          test "$(node -p 'require("./package.json").version')" = "${{ inputs.version }}"
      - name: Publish capix-code
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
