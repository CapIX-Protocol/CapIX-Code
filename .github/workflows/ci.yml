name: CI

on:
  pull_request:
  push:
    branches: [main, staging]
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Lint + Typecheck + Test — NO continue-on-error anywhere.
  # ────────────────────────────────────────────────────────────────────
  lint-typecheck-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/

      - name: Test
        run: npx vitest run

  # ────────────────────────────────────────────────────────────────────
  # Plugin contract — verifies the plugin compiles against the real
  # @opencode-ai/plugin package. Absence of the package is a FAILURE,
  # not a warning — no conditional skip allowed.
  # ────────────────────────────────────────────────────────────────────
  plugin-contract:
    name: Plugin contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify @opencode-ai/plugin is installed
        run: |
          set -euo pipefail
          if [ ! -d node_modules/@opencode-ai/plugin ]; then
            echo "::error::@opencode-ai/plugin is not installed in node_modules. \
          This is a required dependency — its absence is a FAILURE, not a warning. \
          Run 'bash scripts/bootstrap.sh' to fetch the upstream source and install it."
            exit 1
          fi
          echo "@opencode-ai/plugin is installed — plugin contract check active."

      - name: Verify bundled Capix runtime provider resolves
        run: npx vite-node scripts/verify-runtime-provider.ts

      - name: Typecheck plugin against real package
        run: npx tsc --noEmit

      - name: Verify plugin entry point type signature
        run: |
          set -euo pipefail
          if npx tsc --noEmit --listFiles | grep -q "plugin"; then
            echo "Plugin contract verified: compiles against @opencode-ai/plugin"
          else
            echo "::error::Plugin source not found in typecheck scope"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────
  # Windows smoke test — verifies the Rust launcher builds and `doctor`
  # passes on Windows. Only tests the native launcher, not the Bun engine
  # build (which requires cross-compilation). Hard failure — no
  # continue-on-error.
  # ────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Windows smoke test
    runs-on: windows-latest
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Require locked native dependencies
        shell: bash
        run: |
          set -euo pipefail
          test -f launcher/Cargo.lock || {
            echo "::error::launcher/Cargo.lock is missing; reproducible Windows build is blocked."
            exit 1
          }

      - name: Build native launcher
        working-directory: launcher
        run: cargo build --locked --release

      - name: Verify Windows named-pipe broker compiles with locked dependencies
        working-directory: launcher
        run: cargo test --locked --release --no-run

      - name: Stage runtime files for doctor
        shell: bash
        run: |
          set -euo pipefail
          root="launcher/target/release"
          mkdir -p "$root/runtime/src" "$root/config" "$root/engine"
          mkdir -p "$root/runtime/node_modules/@capix/runtime-provider"
          cp src/plugin.ts src/native-bridge.ts src/capix-provider.ts \
             src/broker.ts src/credential-constants.ts src/sandbox.ts src/ai-sdk-provider.ts \
             "$root/runtime/src/"
          cp config/capix-defaults.json "$root/config/"
          cp packages/runtime-provider/package.json \
             "$root/runtime/node_modules/@capix/runtime-provider/"
          touch "$root/engine/capix-engine.exe"

      - name: Smoke test native launcher
        shell: bash
        run: launcher/target/release/capix-code.exe doctor
